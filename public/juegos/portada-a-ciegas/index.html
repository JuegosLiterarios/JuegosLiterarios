<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portada a Ciegas · JuegosLiterarios</title>
<meta name="description" content="Una portada generativa se revela poco a poco. Adivina el libro antes de que se descubra por completo.">
<link rel="stylesheet" href="../assets/juegos.css">
<style>
  .portada-wrap {
    position: relative; width: 200px; aspect-ratio: 2 / 3;
    margin: 6px auto 20px; border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 24px rgba(43,36,23,.18); border: 1px solid var(--line);
  }
  .portada-lienzo { position: absolute; inset: 0; }
  .portada-lienzo svg { width: 100%; height: 100%; display: block; }
  .portada-velo {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr);
  }
  .velo-mosaico { background: var(--bg); border: .5px solid var(--line); transition: opacity .5s ease; }
  .velo-mosaico.revelado { opacity: 0; }
  @media (prefers-reduced-motion: reduce) { .velo-mosaico { transition: none; } }

  .opciones-portada { display: grid; gap: 8px; }
  .opcion-portada {
    border: 1.5px solid var(--line); background: var(--surface);
    color: var(--ink); font-size: .92rem; font-weight: 500;
    border-radius: 10px; padding: 11px 14px; text-align: left; cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
  }
  .opcion-portada:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
  .opcion-portada:disabled { cursor: default; opacity: .85; }
  .opcion-portada.correcta { background: var(--ok); border-color: var(--ok); color: #fff; }
  .opcion-portada.incorrecta { background: var(--bad); border-color: var(--bad); color: #fff; opacity: .75; }

  .sello {
    position: absolute; top: 30%; left: 50%; z-index: 6;
    font-family: var(--serif); font-weight: 700; font-size: clamp(22px, 6vw, 34px);
    letter-spacing: .06em; text-transform: uppercase;
    border: 4px solid currentColor; border-radius: 10px; padding: 6px 16px;
    background: rgba(250,247,241,.9);
    transform: translate(-50%,-50%) rotate(-9deg) scale(.6);
    opacity: 0; pointer-events: none;
    transition: transform .28s cubic-bezier(.2,1.4,.5,1), opacity .2s ease;
  }
  .sello.activo { opacity: .95; transform: translate(-50%,-50%) rotate(-9deg) scale(1); }
  .sello.ok { color: var(--ok); }
  .sello.bad { color: var(--bad); }
  @media (prefers-reduced-motion: reduce) { .sello { transition: none; } }
</style>
</head>
<body>

<main class="wrap wrap-narrow">
  <div class="center fade-up">
    <span class="eyebrow">Juego 24 · Portadas</span>
    <h1 class="game-title">Portada a Ciegas</h1>
    <p class="game-sub">La portada se revela poco a poco. Adivina el libro antes de que se descubra del todo: menos revelado, más puntos.</p>
  </div>

  <div class="stats fade-up">
    <div class="stat"><b><span id="marcadorRonda">1</span>/<span id="marcadorTotal">8</span></b><span>Ronda</span></div>
    <div class="stat"><b id="marcadorPuntos">0</b><span>Puntos</span></div>
    <div class="stat"><b id="marcadorMejor">0</b><span>Mejor puntaje</span></div>
  </div>

  <div class="panel fade-up" id="game" style="position:relative;">
    <div class="sello ok" id="selloCorrecto">¡Acertaste!</div>
    <div class="sello bad" id="selloIncorrecto">Era esta</div>

    <div class="portada-wrap">
      <div class="portada-lienzo" id="portadaLienzo"></div>
      <div class="portada-velo" id="portadaVelo"></div>
    </div>

    <div class="opciones-portada" id="opcionesPortada"></div>

    <div class="btn-row">
      <button class="btn btn-primary btn-block" id="btnSiguiente" hidden>Siguiente portada</button>
    </div>
  </div>

  <div class="panel center" id="result" style="display:none;">
    <h2 id="resTitle" style="font-family:var(--serif); margin-bottom:8px;"></h2>
    <p id="resText" style="color:var(--muted);"></p>
    <div class="btn-row">
      <button class="btn btn-primary" id="againBtn">Jugar de nuevo</button>
    </div>
  </div>

  <p class="foot">Portadas generativas originales · cero arte con derechos de autor</p>
</main>

<script src="../assets/shared.js"></script>
<script src="script.js"></script>
</body>
</html>
