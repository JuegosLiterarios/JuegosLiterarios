<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historia en Seis Palabras · JuegosLiterarios</title>
<link rel="stylesheet" href="../assets/juegos.css">
<style>
  .prompt-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
  .pcard {
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px; text-align: center; box-shadow: var(--shadow);
  }
  .pcard .kind { font-size: .62rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); }
  .pcard .val { font-family: var(--serif); font-size: .95rem; font-weight: 600; margin-top: 5px; line-height: 1.3; }
  .timer-ring { font-family: var(--serif); font-size: 2.6rem; font-weight: 700; text-align: center; margin-top: 14px; }
  .timer-ring.low { color: var(--bad); animation: pop .5s ease infinite; }
  .six-input {
    width: 100%; margin-top: 14px; padding: 16px; text-align: center;
    font-family: var(--serif); font-size: 1.25rem; color: var(--ink);
    background: #FDFBF6; border: 1.5px solid var(--line); border-radius: 12px; outline: none;
  }
  .six-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(180,83,9,.12); }
  .gallery { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  .gitem {
    font-family: var(--serif); font-size: 1.05rem; font-style: italic; text-align: center;
    background: #FDFBF6; border: 1px solid var(--line); border-left: 4px solid var(--gold);
    border-radius: 8px; padding: 14px 18px; animation: fadeUp .4s ease;
  }
  @media (max-width: 480px) { .prompt-cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<main class="wrap wrap-narrow">
  <div class="center fade-up">
    <span class="eyebrow">Juego 09 · Escritura relámpago</span>
    <h1 class="game-title">Historia en Seis Palabras</h1>
    <p class="game-sub">Como el legendario relato de seis palabras: un personaje, un objeto y un giro — escribe tu historia exacta en 60 segundos.</p>
  </div>

  <div class="panel center" id="setup">
    <div class="prompt-cards">
      <div class="pcard"><div class="kind">🎭 Personaje</div><div class="val" id="pPersonaje">?</div></div>
      <div class="pcard"><div class="kind">🗝️ Objeto</div><div class="val" id="pObjeto">?</div></div>
      <div class="pcard"><div class="kind">⚡ Giro</div><div class="val" id="pGiro">?</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn">⏱ Comenzar los 60 s</button>
      <button class="btn btn-ghost" id="otherBtn">Otro estímulo</button>
    </div>
    <div class="stats" id="recordStats"></div>
  </div>

  <div class="panel" id="game" style="display:none">
    <div class="timer-ring" id="timerEl">60</div>
    <p class="note center">Escribe <b>exactamente 6 palabras</b></p>
    <input class="six-input" id="story" placeholder="Tu historia aquí…" autocomplete="off">
    <div class="btn-row">
      <button class="btn btn-accent" id="saveBtn" disabled>Guardar historia</button>
    </div>
  </div>

  <div class="gallery" id="gallery"></div>

  <p class="foot">Hecho para leer jugando · JuegosLiterarios</p>
</main>

<script src="../assets/shared.js"></script>
<script>
'use strict';
const PERSONAJES = ['una viuda insomne', 'un relojero ciego', 'la última bibliotecaria', 'una niña que no envejece', 'un fantasma jubilado', 'el capitán de un barco hundido', 'una traductora sin idioma propio', 'un ladrón de finales'];
const OBJETOS = ['una carta sin enviar', 'un espejo roto', 'una llave que no abre nada', 'un reloj detenido a medianoche', 'una fotografía quemada a la mitad', 'un boleto de tren vencido', 'una maleta vacía', 'un mapa de un lugar inexistente'];
const GIROS = ['y nadie lo notó', 'hasta que fue tarde', 'por segunda vez', 'sin saber por qué', 'y todo cambió de sentido', 'como si fuera la última vez', 'aunque ya lo sabía', 'y no hubo vuelta atrás'];
const ROUND_SECONDS = 60;

let timeLeft = ROUND_SECONDS, timer = null, savedCount = 0;

const $ = id => document.getElementById(id);

function drawPrompt() {
  $('pPersonaje').textContent = JL.pick(PERSONAJES);
  $('pObjeto').textContent = JL.pick(OBJETOS);
  $('pGiro').textContent = JL.pick(GIROS);
}

function renderRecords() {
  $('recordStats').innerHTML = `<div class="stat"><b>${JL.readBest('jl_seis_count')}</b><span>Historias escritas</span></div>`;
}

function start() {
  clearInterval(timer);
  timeLeft = ROUND_SECONDS;
  $('story').value = '';
  $('saveBtn').disabled = true;
  $('setup').style.display = 'none';
  $('game').style.display = 'block';
  $('timerEl').textContent = timeLeft;
  $('timerEl').classList.remove('low');
  $('story').focus();
  timer = setInterval(() => {
    timeLeft--;
    $('timerEl').textContent = timeLeft;
    if (timeLeft <= 10) $('timerEl').classList.add('low');
    if (timeLeft <= 0) timeUp();
  }, 1000);
}

function countWords(t) { return t.trim() ? t.trim().split(/\s+/).length : 0; }

$('story').addEventListener('input', () => {
  $('saveBtn').disabled = countWords($('story').value) !== 6;
});

function save() {
  const txt = $('story').value.trim();
  if (countWords(txt) !== 6) return;
  clearInterval(timer);
  const g = $('gallery');
  const item = document.createElement('div');
  item.className = 'gitem';
  item.textContent = '“' + txt + '”';
  g.prepend(item);
  savedCount++;
  JL.saveBest('jl_seis_count', savedCount + JL.readBest('jl_seis_count') * 0); // cuenta de sesión
  try { localStorage.setItem('jl_seis_count', String(JL.readBest('jl_seis_count') + 1)); } catch (e) {}
  backToSetup('✓ Historia guardada. ¿Otra?');
}

function timeUp() {
  clearInterval(timer);
  backToSetup('⏱ Se acabó el tiempo — inténtalo con un nuevo estímulo.');
}

function backToSetup(msg) {
  $('game').style.display = 'none';
  $('setup').style.display = 'block';
  drawPrompt();
  renderRecords();
}

$('startBtn').addEventListener('click', start);
$('otherBtn').addEventListener('click', drawPrompt);
$('saveBtn').addEventListener('click', save);

JL.injectTopbar();
drawPrompt();
renderRecords();
</script>
</body>
</html>
