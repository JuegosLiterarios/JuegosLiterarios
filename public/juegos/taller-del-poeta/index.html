<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Taller del Poeta · JuegosLiterarios</title>
<meta name="description" content="Poemas reales con palabras borradas. Restaura cada verso eligiendo la palabra exacta del poeta.">
<link rel="stylesheet" href="../assets/juegos.css">
<style>
  .poema {
    font-family: var(--serif); font-size: 1.1rem; line-height: 2.1; color: var(--ink);
    border-left: 3px solid var(--gold); padding: 6px 0 6px 16px; margin: 10px 0 16px;
  }
  .hueco {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 70px; padding: 0 8px; margin: 0 2px;
    border-bottom: 2px dashed var(--accent); border-radius: 6px 6px 0 0;
    background: var(--accent-soft); color: var(--accent);
    font-weight: 700; font-size: .95rem; cursor: default;
  }
  .hueco.ok { border-bottom-color: var(--ok); border-bottom-style: solid; background: var(--ok-soft); color: var(--ok); }
  .hueco.mal { border-bottom-color: var(--bad); border-bottom-style: solid; background: var(--bad-soft); color: var(--bad); }

  .fila-opciones { margin-bottom: 10px; }
  .fila-opciones .num-hueco {
    display: inline-block; width: 24px; font-family: var(--serif); font-weight: 700; color: var(--accent);
  }
  .opciones-hueco { display: inline-flex; flex-wrap: wrap; gap: 6px; }
  .opcion-hueco {
    border: 1.5px solid var(--line); background: var(--surface); color: var(--ink);
    border-radius: 20px; padding: 6px 14px; font-size: .88rem; font-weight: 500; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opcion-hueco:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .opcion-hueco.elegida { border-color: var(--accent); background: var(--accent); color: #fff; }
  .opcion-hueco:disabled { cursor: default; }
  .opcion-hueco.ok { border-color: var(--ok); background: var(--ok); color: #fff; }
  .opcion-hueco.mal { border-color: var(--bad); background: var(--bad-soft); color: var(--bad); }

  .sello {
    position: absolute; top: 30%; left: 50%; z-index: 6;
    font-family: var(--serif); font-weight: 700; font-size: clamp(22px, 6vw, 34px);
    letter-spacing: .06em; text-transform: uppercase;
    border: 4px solid currentColor; border-radius: 10px; padding: 6px 16px;
    background: rgba(250,247,241,.9);
    transform: translate(-50%,-50%) rotate(-9deg) scale(.6);
    opacity: 0; pointer-events: none;
    transition: transform .28s cubic-bezier(.2,1.4,.5,1), opacity .2s ease;
  }
  .sello.activo { opacity: .95; transform: translate(-50%,-50%) rotate(-9deg) scale(1); }
  .sello.ok { color: var(--ok); }
  @media (prefers-reduced-motion: reduce) { .sello { transition: none; } }
</style>
</head>
<body>

<main class="wrap wrap-narrow">
  <div class="center fade-up">
    <span class="eyebrow">Juego 25 · Poesía</span>
    <h1 class="game-title">El Taller del Poeta</h1>
    <p class="game-sub">Poemas reales con palabras borradas. Elige la palabra exacta del poeta y restaura cada verso.</p>
  </div>

  <div class="stats fade-up">
    <div class="stat"><b id="marcadorRonda">1/4</b><span>Poema</span></div>
    <div class="stat"><b id="marcadorPuntos">0</b><span>Puntos</span></div>
    <div class="stat"><b id="marcadorMejor">0</b><span>Mejor puntaje</span></div>
  </div>

  <div class="panel fade-up" id="game" style="position:relative;">
    <div class="sello ok" id="selloPerfecto">¡Poema perfecto!</div>
    <p class="note center" id="obraActual" style="margin-bottom:6px;"></p>

    <div class="poema" id="poema"></div>
    <div id="opcionesHuecos"></div>

    <div class="explicacion" id="explicacion" hidden style="margin-top:6px; padding:10px 14px; border-radius:10px; background:var(--accent-soft); font-size:.88rem; color:var(--ink-soft); font-style:italic;"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnComprobar" disabled>Comprobar poema</button>
      <button class="btn btn-primary" id="btnSiguiente" hidden>Siguiente poema →</button>
    </div>
  </div>

  <div class="panel center" id="result" style="display:none;">
    <h2 id="resTitle" style="font-family:var(--serif); margin-bottom:8px;"></h2>
    <p id="resText" style="color:var(--muted);"></p>
    <div class="btn-row">
      <button class="btn btn-primary" id="againBtn">Otro taller</button>
    </div>
  </div>

  <p class="foot">12 poemas del canon en español · las palabras exactas importan</p>
</main>

<script src="../assets/shared.js"></script>
<script src="script.js"></script>
</body>
</html>
