<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea de Tiempo · JuegosLiterarios</title>
<meta name="description" content="Ordena obras, autores y movimientos literarios en su orden cronológico correcto.">
<link rel="stylesheet" href="../assets/juegos.css">
<style>
  .lista-tiempo { list-style: none; margin: 6px 0 18px; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .item-tiempo {
    display: flex; align-items: center; gap: 10px;
    border: 1.5px solid var(--line); background: var(--surface);
    border-radius: 10px; padding: 10px 12px; transition: border-color .15s, background .15s;
  }
  .item-tiempo__nombre { flex: 1; font-size: .95rem; color: var(--ink); font-weight: 500; }
  .item-tiempo__anio { font-family: var(--serif); font-weight: 700; font-size: .95rem; color: var(--accent); min-width: 46px; text-align: right; }
  .item-tiempo__flechas { display: flex; flex-direction: column; gap: 2px; }
  .item-tiempo__flechas button {
    border: 1px solid var(--line); background: #EFE9DA; color: var(--ink);
    width: 26px; height: 20px; font-size: 10px; border-radius: 6px; cursor: pointer;
    transition: background .12s;
  }
  .item-tiempo__flechas button:hover:not(:disabled) { background: var(--accent-soft); border-color: var(--accent); }
  .item-tiempo__flechas button:disabled { opacity: .3; cursor: default; }
  .item-tiempo.correcta { border-color: var(--ok); background: var(--ok-soft); }
  .item-tiempo.incorrecta { border-color: var(--bad); background: var(--bad-soft); }

  .orden-correcto {
    margin: 0 0 14px; padding: 10px 14px; border-radius: 10px;
    background: var(--accent-soft); font-size: .88rem; color: var(--ink-soft); line-height: 1.6;
  }
  .orden-correcto b { color: var(--ink); }

  .sello {
    position: absolute; top: 34%; left: 50%; z-index: 6;
    font-family: var(--serif); font-weight: 700; font-size: clamp(22px, 6vw, 34px);
    letter-spacing: .06em; text-transform: uppercase;
    border: 4px solid currentColor; border-radius: 10px; padding: 6px 16px;
    background: rgba(250,247,241,.9);
    transform: translate(-50%,-50%) rotate(-9deg) scale(.6);
    opacity: 0; pointer-events: none;
    transition: transform .28s cubic-bezier(.2,1.4,.5,1), opacity .2s ease;
  }
  .sello.activo { opacity: .95; transform: translate(-50%,-50%) rotate(-9deg) scale(1); }
  .sello.ok { color: var(--ok); }
  @media (prefers-reduced-motion: reduce) { .sello { transition: none; } }
</style>
</head>
<body>

<main class="wrap wrap-narrow">
  <div class="center fade-up">
    <span class="eyebrow">Juego 21 · Historia</span>
    <h1 class="game-title">Línea de Tiempo</h1>
    <p class="game-sub">Ordena cada serie cronológicamente usando las flechas ▲▼. Los años se revelan al comprobar.</p>
  </div>

  <div class="stats fade-up">
    <div class="stat"><b id="marcadorRonda">1/8</b><span>Línea</span></div>
    <div class="stat"><b id="marcadorPuntos">0</b><span>Puntos</span></div>
    <div class="stat"><b id="marcadorMejor">0</b><span>Mejor puntaje</span></div>
  </div>

  <div class="panel fade-up" id="game" style="position:relative;">
    <div class="sello ok" id="selloCorrecto">¡Orden perfecto!</div>
    <p class="note center" id="temaActual" style="margin-bottom:10px;">Ordena estos elementos cronológicamente.</p>

    <ol class="lista-tiempo" id="listaTiempo"></ol>

    <div class="orden-correcto" id="ordenCorrecto" hidden></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnComprobar">Comprobar orden</button>
      <button class="btn btn-primary" id="btnSiguiente" hidden>Siguiente →</button>
    </div>
  </div>

  <div class="panel center" id="result" style="display:none;">
    <h2 id="resTitle" style="font-family:var(--serif); margin-bottom:8px;"></h2>
    <p id="resText" style="color:var(--muted);"></p>
    <div class="btn-row">
      <button class="btn btn-primary" id="againBtn">Jugar de nuevo</button>
    </div>
  </div>

  <p class="foot">12 líneas temáticas · 8 por partida</p>
</main>

<script src="../assets/shared.js"></script>
<script src="script.js"></script>
</body>
</html>
